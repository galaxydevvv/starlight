<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunar | Search</title>
  <link rel="stylesheet" href="./assets/css/site.css" />
</head>
<body data-page="search">
  <div class="site-shell">
    <aside class="sidebar">
      <a class="brand" href="./index.html">lunar</a>
      <nav class="nav-stack">
        <a class="nav-pill active-home" href="./index.html">home</a>
        <a class="nav-pill active-search" href="./search.html">search</a>
        <a class="nav-pill active-games" href="./games.html">games</a>
      </nav>
    </aside>

    <main class="page search-page">
      <section class="hero hero-compact">
        <p class="eyebrow">proxied browse</p>
        <h1 class="logo-text">lunar</h1>
      </section>

      <section class="search-box-wrap">
        <form class="search-form" id="search-form">
          <input class="search-input" id="search-input" type="text" placeholder="search..." autocomplete="off" spellcheck="false" />
          <button class="search-button" type="submit">launch</button>
        </form>
        <p class="search-hint" id="proxy-status">Loading Scramjet proxy...</p>
      </section>

      <section class="browser-panel glass-panel browser-panel-compact">
        <div class="browser-url" id="proxy-url">Searches open through Scramjet in this tab.</div>
        <div class="proxy-note">
          <p>Type a URL like `example.com` or a search term.</p>
          <p>The proxy starts only when you launch a search to reduce crashes on hosted copies.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="./assets/vendor/baremux/index.js"></script>
  <script src="./assets/vendor/scram/scramjet.all.js"></script>
  <script src="./assets/js/ui.js"></script>
  <script src="./assets/js/proxy.js"></script>
  <script src="./assets/js/search.js"></script>
</body>
</html>
